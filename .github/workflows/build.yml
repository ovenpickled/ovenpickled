name: README build
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"  # Runs daily at 4 AM UTC
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
      - name: Get Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Configure pip cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Update README file
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py
      - name: Commit
        run: |-
          git add dark_mode.svg light_mode.svg
          git diff --cached
          git config --global user.email "github-actions-bot@ovenpickled.github.io"
          git config --global user.name "ovenpickled/GitHub-Actions-Bot"
          git commit -m "Updated README" || echo "No changes to commit"
          git push
